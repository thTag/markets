name: 拉取 Astr 数据
on:
  workflow_dispatch:

jobs:
  sync-astr:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Astr plugin market
        run: |
          mkdir -p astr
          SRC_URL="https://github.com/AstrBotDevs/AstrBot_Plugins_Collection/raw/refs/heads/main/plugin_cache_original.json"
          
          # 拉取官方原始文件，严格只保留这 1 个文件
          curl -fsSL "$SRC_URL" -o "astr/plugin_cache_original.json"

      - name: Upload Astr Artifact
        uses: actions/upload-artifact@v7
        with:
          name: astr-data
          path: astr/
          retention-days: 1
