name: 核心调度器
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  control-plane:
    runs-on: ubuntu-latest
    steps:
      - name: Get Workflow IDs
        id: get_ids
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KOI_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/koi.yml" --jq '.id')
          ASTR_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/astr.yml" --jq '.id')
          DEPLOY_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/deploy.yml" --jq '.id')
          
          echo "koi_id=$KOI_ID" >> $GITHUB_OUTPUT
          echo "astr_id=$ASTR_ID" >> $GITHUB_OUTPUT
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Trigger Pull Workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/${{ github.repository }}/actions/workflows/${{ steps.get_ids.outputs.koi_id }}/dispatches" -f ref=main
          gh api "/repos/${{ github.repository }}/actions/workflows/${{ steps.get_ids.outputs.astr_id }}/dispatches" -f ref=main
          
          echo "已触发 koi.yml 和 astr.yml，等待 15 秒让 GitHub 初始化..."
          sleep 15

      - name: Wait for Success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KOI_ID="${{ steps.get_ids.outputs.koi_id }}"
          ASTR_ID="${{ steps.get_ids.outputs.astr_id }}"
          
          echo "开始轮询运行状态..."
          while true; do
            # 直接获取最新的一条运行记录，不再使用时间戳过滤，解决秒级竞态问题
            KOI_STATUS=$(gh api "/repos/${{ github.repository }}/actions/workflows/$KOI_ID/runs?per_page=1" --jq '.workflow_runs[0].status')
            ASTR_STATUS=$(gh api "/repos/${{ github.repository }}/actions/workflows/$ASTR_ID/runs?per_page=1" --jq '.workflow_runs[0].status')
            
            echo "Koi状态: $KOI_STATUS | Astr状态: $ASTR_STATUS"
            
            if [[ "$KOI_STATUS" == "completed" && "$ASTR_STATUS" == "completed" ]]; then
              KOI_CONCLUSION=$(gh api "/repos/${{ github.repository }}/actions/workflows/$KOI_ID/runs?per_page=1" --jq '.workflow_runs[0].conclusion')
              ASTR_CONCLUSION=$(gh api "/repos/${{ github.repository }}/actions/workflows/$ASTR_ID/runs?per_page=1" --jq '.workflow_runs[0].conclusion')
              
              if [[ "$KOI_CONCLUSION" == "success" && "$ASTR_CONCLUSION" == "success" ]]; then
                echo "两个拉取任务均成功！"
                break
              else
                echo "存在失败任务(Koi: $KOI_CONCLUSION, Astr: $ASTR_CONCLUSION)，终止部署。"
                exit 1
              fi
            fi
            
            sleep 5
          done

      - name: Sleep 10 s
        run: sleep 10

      - name: Trigger Deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_ID="${{ steps.get_ids.outputs.deploy_id }}"
          echo "数据拉取完毕且等待结束，触发部署..."
          gh api "/repos/${{ github.repository }}/actions/workflows/$DEPLOY_ID/dispatches" -f ref=main
          echo "部署已触发！"
