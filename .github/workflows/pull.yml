name: 核心调度器 + 部署

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  # 主控任务：同时触发三个数据源，统一轮询等待，失败则单独重试
  control-plane:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get Workflow IDs
        id: get_ids
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KOI_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/koi.yml" --jq '.id')
          ASTR_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/astr.yml" --jq '.id')
          MAI_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/mai.yml" --jq '.id')
          
          echo "koi_id=$KOI_ID" >> $GITHUB_OUTPUT
          echo "astr_id=$ASTR_ID" >> $GITHUB_OUTPUT
          echo "mai_id=$MAI_ID" >> $GITHUB_OUTPUT

      # 同时触发三个数据源拉取
      - name: Trigger all workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/${{ github.repository }}/actions/workflows/${{ steps.get_ids.outputs.koi_id }}/dispatches" -f ref=main
          gh api "/repos/${{ github.repository }}/actions/workflows/${{ steps.get_ids.outputs.astr_id }}/dispatches" -f ref=main
          gh api "/repos/${{ github.repository }}/actions/workflows/${{ steps.get_ids.outputs.mai_id }}/dispatches" -f ref=main
          echo "✅ 已同时触发三个数据源"
          sleep 10

      # 轮询等待所有任务完成，失败的记录下来
      - name: Wait for all workflows
        id: wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KOI_ID="${{ steps.get_ids.outputs.koi_id }}"
          ASTR_ID="${{ steps.get_ids.outputs.astr_id }}"
          MAI_ID="${{ steps.get_ids.outputs.mai_id }}"

          MAX_WAIT=60  # 最多等 60 秒
          WAIT_COUNT=0

          KOI_DONE=false
          ASTR_DONE=false
          MAI_DONE=false
          KOI_FAIL=false
          ASTR_FAIL=false
          MAI_FAIL=false

          while [ $WAIT_COUNT -lt $MAX_WAIT ]; do
            # 获取三个任务状态
            if [ "$KOI_DONE" = false ]; then
              KOI_STATUS=$(gh api "/repos/${{ github.repository }}/actions/workflows/$KOI_ID/runs?per_page=1" --jq '.workflow_runs[0].status')
              if [ "$KOI_STATUS" = "completed" ]; then
                KOI_DONE=true
                KOI_CONCLUSION=$(gh api "/repos/${{ github.repository }}/actions/workflows/$KOI_ID/runs?per_page=1" --jq '.workflow_runs[0].conclusion')
                if [ "$KOI_CONCLUSION" != "success" ]; then
                  KOI_FAIL=true
                  echo "❌ Koi 失败: $KOI_CONCLUSION"
                else
                  echo "✅ Koi 成功"
                fi
              fi
            fi

            if [ "$ASTR_DONE" = false ]; then
              ASTR_STATUS=$(gh api "/repos/${{ github.repository }}/actions/workflows/$ASTR_ID/runs?per_page=1" --jq '.workflow_runs[0].status')
              if [ "$ASTR_STATUS" = "completed" ]; then
                ASTR_DONE=true
                ASTR_CONCLUSION=$(gh api "/repos/${{ github.repository }}/actions/workflows/$ASTR_ID/runs?per_page=1" --jq '.workflow_runs[0].conclusion')
                if [ "$ASTR_CONCLUSION" != "success" ]; then
                  ASTR_FAIL=true
                  echo "❌ Astr 失败: $ASTR_CONCLUSION"
                else
                  echo "✅ Astr 成功"
                fi
              fi
            fi

            if [ "$MAI_DONE" = false ]; then
              MAI_STATUS=$(gh api "/repos/${{ github.repository }}/actions/workflows/$MAI_ID/runs?per_page=1" --jq '.workflow_runs[0].status')
              if [ "$MAI_STATUS" = "completed" ]; then
                MAI_DONE=true
                MAI_CONCLUSION=$(gh api "/repos/${{ github.repository }}/actions/workflows/$MAI_ID/runs?per_page=1" --jq '.workflow_runs[0].conclusion')
                if [ "$MAI_CONCLUSION" != "success" ]; then
                  MAI_FAIL=true
                  echo "❌ Mai 失败: $MAI_CONCLUSION"
                else
                  echo "✅ Mai 成功"
                fi
              fi
            fi

            # 如果全部完成，退出轮询
            if [ "$KOI_DONE" = true ] && [ "$ASTR_DONE" = true ] && [ "$MAI_DONE" = true ]; then
              echo "所有任务已完成"
              break
            fi

            sleep 5
            WAIT_COUNT=$((WAIT_COUNT + 5))
          done

          # 记录失败状态供后续重试
          echo "koi_fail=$KOI_FAIL" >> $GITHUB_OUTPUT
          echo "astr_fail=$ASTR_FAIL" >> $GITHUB_OUTPUT
          echo "mai_fail=$MAI_FAIL" >> $GITHUB_OUTPUT

      # 重试失败的任务（最多重试 2 次）
      - name: Retry failed workflows
        if: steps.wait.outputs.koi_fail == 'true' || steps.wait.outputs.astr_fail == 'true' || steps.wait.outputs.mai_fail == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KOI_ID="${{ steps.get_ids.outputs.koi_id }}"
          ASTR_ID="${{ steps.get_ids.outputs.astr_id }}"
          MAI_ID="${{ steps.get_ids.outputs.mai_id }}"

          for retry in 1 2; do
            echo "===== 第 $retry 次重试 ====="
            
            # 重试失败的任务
            if [ "${{ steps.wait.outputs.koi_fail }}" = "true" ]; then
              echo "重试 Koi..."
              gh api "/repos/${{ github.repository }}/actions/workflows/$KOI_ID/dispatches" -f ref=main
            fi
            if [ "${{ steps.wait.outputs.astr_fail }}" = "true" ]; then
              echo "重试 Astr..."
              gh api "/repos/${{ github.repository }}/actions/workflows/$ASTR_ID/dispatches" -f ref=main
            fi
            if [ "${{ steps.wait.outputs.mai_fail }}" = "true" ]; then
              echo "重试 Mai..."
              gh api "/repos/${{ github.repository }}/actions/workflows/$MAI_ID/dispatches" -f ref=main
            fi

            sleep 10

            # 轮询重试的任务
            KOI_RETRY_DONE=false
            ASTR_RETRY_DONE=false
            MAI_RETRY_DONE=false

            WAIT_COUNT=0
            while [ $WAIT_COUNT -lt 60 ]; do
              if [ "${{ steps.wait.outputs.koi_fail }}" = "true" ] && [ "$KOI_RETRY_DONE" = false ]; then
                STATUS=$(gh api "/repos/${{ github.repository }}/actions/workflows/$KOI_ID/runs?per_page=1" --jq '.workflow_runs[0].status')
                if [ "$STATUS" = "completed" ]; then
                  KOI_RETRY_DONE=true
                  CONCLUSION=$(gh api "/repos/${{ github.repository }}/actions/workflows/$KOI_ID/runs?per_page=1" --jq '.workflow_runs[0].conclusion')
                  if [ "$CONCLUSION" = "success" ]; then
                    echo "✅ Koi 重试成功"
                    echo "koi_fail=false" >> $GITHUB_OUTPUT
                  else
                    echo "❌ Koi 重试仍失败"
                  fi
                fi
              fi

              if [ "${{ steps.wait.outputs.astr_fail }}" = "true" ] && [ "$ASTR_RETRY_DONE" = false ]; then
                STATUS=$(gh api "/repos/${{ github.repository }}/actions/workflows/$ASTR_ID/runs?per_page=1" --jq '.workflow_runs[0].status')
                if [ "$STATUS" = "completed" ]; then
                  ASTR_RETRY_DONE=true
                  CONCLUSION=$(gh api "/repos/${{ github.repository }}/actions/workflows/$ASTR_ID/runs?per_page=1" --jq '.workflow_runs[0].conclusion')
                  if [ "$CONCLUSION" = "success" ]; then
                    echo "✅ Astr 重试成功"
                    echo "astr_fail=false" >> $GITHUB_OUTPUT
                  else
                    echo "❌ Astr 重试仍失败"
                  fi
                fi
              fi

              if [ "${{ steps.wait.outputs.mai_fail }}" = "true" ] && [ "$MAI_RETRY_DONE" = false ]; then
                STATUS=$(gh api "/repos/${{ github.repository }}/actions/workflows/$MAI_ID/runs?per_page=1" --jq '.workflow_runs[0].status')
                if [ "$STATUS" = "completed" ]; then
                  MAI_RETRY_DONE=true
                  CONCLUSION=$(gh api "/repos/${{ github.repository }}/actions/workflows/$MAI_ID/runs?per_page=1" --jq '.workflow_runs[0].conclusion')
                  if [ "$CONCLUSION" = "success" ]; then
                    echo "✅ Mai 重试成功"
                    echo "mai_fail=false" >> $GITHUB_OUTPUT
                  else
                    echo "❌ Mai 重试仍失败"
                  fi
                fi
              fi

              ALL_DONE=true
              if [ "${{ steps.wait.outputs.koi_fail }}" = "true" ] && [ "$KOI_RETRY_DONE" = false ]; then ALL_DONE=false; fi
              if [ "${{ steps.wait.outputs.astr_fail }}" = "true" ] && [ "$ASTR_RETRY_DONE" = false ]; then ALL_DONE=false; fi
              if [ "${{ steps.wait.outputs.mai_fail }}" = "true" ] && [ "$MAI_RETRY_DONE" = false ]; then ALL_DONE=false; fi

              if [ "$ALL_DONE" = true ]; then
                break
              fi

              sleep 5
              WAIT_COUNT=$((WAIT_COUNT + 5))
            done

            # 如果重试成功了就退出循环
            if [ "${{ steps.wait.outputs.koi_fail }}" != "true" ] && [ "${{ steps.wait.outputs.astr_fail }}" != "true" ] && [ "${{ steps.wait.outputs.mai_fail }}" != "true" ]; then
              echo "✅ 所有重试成功"
              break
            fi

            if [ $retry -lt 2 ]; then
              echo "⏳ 等待 10s 后再次重试..."
              sleep 10
            else
              echo "❌ 重试 2 次后仍有失败，跳过失败的源"
            fi
          done

      # 获取三个拉取任务的最新 Run ID
      - name: Resolve latest run-ids
        id: runids
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KOI_WF_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/koi.yml" --jq '.id')
          ASTR_WF_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/astr.yml" --jq '.id')
          MAI_WF_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/mai.yml" --jq '.id')

          KOI_RUN_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/$KOI_WF_ID/runs?per_page=1" --jq '.workflow_runs[0].id')
          ASTR_RUN_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/$ASTR_WF_ID/runs?per_page=1" --jq '.workflow_runs[0].id')
          MAI_RUN_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/$MAI_WF_ID/runs?per_page=1" --jq '.workflow_runs[0].id')

          echo "koi_run_id=$KOI_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "astr_run_id=$ASTR_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "mai_run_id=$MAI_RUN_ID" >> "$GITHUB_OUTPUT"

      # 下载三个数据源的制品到 dist 目录
      - name: Download Koi Data
        uses: actions/download-artifact@v8
        with:
          name: koi-data
          path: dist/koi
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.runids.outputs.koi_run_id }}

      - name: Download Astr Data
        uses: actions/download-artifact@v8
        with:
          name: astr-data
          path: dist/astr
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.runids.outputs.astr_run_id }}

      - name: Download Mai Data
        uses: actions/download-artifact@v8
        with:
          name: mai-data
          path: dist/mai
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.runids.outputs.mai_run_id }}

      # 复制静态文件到打包目录，准备部署
      - name: Prepare static files
        run: |
          cp index.html dist/
          cp CNAME dist/
          cp favicon.ico dist/
          touch dist/.nojekyll

      # 部署到 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true