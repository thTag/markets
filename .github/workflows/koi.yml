name: 拉取 Koi 数据
on:
  workflow_dispatch:

jobs:
  sync-koi:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Koi plugin market
        run: |
          mkdir -p koi
          curl -fsSL "https://registry.koishi.chat/index.json" -o "koi/index.json"

      - name: Preprocess Koi Data
        run: |
          node -e "
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('koi/index.json', 'utf8'));
          let all = [];

          // 路径 A：官方实际结构 { objects: [ { package: {...}, ... } ] }
          if (Array.isArray(raw.objects)) {
            raw.objects.forEach(o => {
              if (o && typeof o === 'object') {
                const pkg = o.package || {};
                const links = pkg.links || {};
                const maint = Array.isArray(pkg.maintainers) && pkg.maintainers.length ? pkg.maintainers[0] : null;
                const pub = pkg.publisher || null;
                const author =
                  (pub && pub.username) ||
                  (maint && maint.username) || '';

                const name = pkg.name || o.shortname || '';
                const version = pkg.version || '';
                const description =
                  (pkg.manifest && pkg.manifest.description && (pkg.manifest.description.zh || pkg.manifest.description.en)) ||
                  pkg.description || '';
                const repo =
                  links.repository || links.npm || '';

                const tags = Array.isArray(pkg.keywords) ? pkg.keywords : [];

                if (name) {
                  all.push({ name, version, description, author, repo, tags });
                }
              }
            });
          }

          // 路径 B：兜底（如果将来接口改回“命名空间.packages”之类结构）
          if (!all.length) {
            for (const ns in raw) {
              const namespace = raw[ns];
              if (namespace && Array.isArray(namespace.packages)) {
                namespace.packages.forEach(p => {
                  const pkg = p.package || p;
                  const links = pkg.links || {};
                  const maint = Array.isArray(pkg.maintainers) && pkg.maintainers.length ? pkg.maintainers[0] : null;
                  const pub = pkg.publisher || null;
                  const author =
                    (pub && pub.username) ||
                    (maint && maint.username) || '';

                  const name = pkg.name || p.shortname || '';
                  const version = pkg.version || '';
                  const description =
                    (pkg.manifest && pkg.manifest.description && (pkg.manifest.description.zh || pkg.manifest.description.en)) ||
                    pkg.description || '';
                  const repo = links.repository || links.npm || '';
                  const tags = Array.isArray(pkg.keywords) ? pkg.keywords : [];

                  if (name) {
                    all.push({ name, version, description, author, repo, tags });
                  }
                });
              } else if (Array.isArray(namespace)) {
                namespace.forEach(p => {
                  const pkg = p.package || p;
                  const links = pkg.links || {};
                  const maint = Array.isArray(pkg.maintainers) && pkg.maintainers.length ? pkg.maintainers[0] : null;
                  const pub = pkg.publisher || null;
                  const author =
                    (pub && pub.username) ||
                    (maint && maint.username) || '';

                  const name = pkg.name || p.shortname || '';
                  const version = pkg.version || '';
                  const description =
                    (pkg.manifest && pkg.manifest.description && (pkg.manifest.description.zh || pkg.manifest.description.en)) ||
                    pkg.description || '';
                  const repo = links.repository || links.npm || '';
                  const tags = Array.isArray(pkg.keywords) ? pkg.keywords : [];

                  if (name) {
                    all.push({ name, version, description, author, repo, tags });
                  }
                });
              }
            }
          }

          fs.writeFileSync('koi/flat.json', JSON.stringify(all));
          console.log('清洗完成，共提取插件数量: ' + all.length);
          "
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Koi Artifact
        uses: actions/upload-artifact@v7
        with:
          name: koi-data
          path: koi/
          retention-days: 1
