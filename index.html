<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>插件市场</title>
  <style>
    /* ===================== 全局重置 & 主题变量 ===================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* 浅色模式（默认） */
    :root {
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-light: #eef2ff;
      --accent-grad-start: #6366f1;
      --accent-grad-end: #8b5cf6;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.10);
      --radius: 12px;
      --transition: 0.2s ease;
    }

    /* 深色模式（暖色系） */
    [data-theme="dark"] {
      --bg: #121212;
      --card-bg: #1e1e1e;
      --text: #e8e8e8;
      --text-secondary: #b0b0b0;
      --text-muted: #7a7a7a;
      --border: #333333;
      --accent: #f59e0b;
      --accent-hover: #d97706;
      --accent-light: #2d2a1a;
      --accent-grad-start: #f59e0b;
      --accent-grad-end: #f97316;
      --shadow: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.6);
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 0 16px 40px;
      transition: background 0.3s, color 0.3s;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===================== 布局容器 ===================== */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 0;
    }

    /* ===================== 头部 ===================== */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      user-select: none;
    }
    .header-left h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent-grad-start), var(--accent-grad-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: background 0.3s;
    }
    .header-left .badge {
      font-size: 0.7rem;
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 10px;
      border-radius: 999px;
      font-weight: 500;
      -webkit-text-fill-color: var(--accent);
      border: 1px solid var(--border);
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }
    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--shadow-hover);
    }
    .action-btn.success {
      border-color: #22c55e;
      color: #22c55e;
    }

    /* ===================== 控制栏 ===================== */
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px 24px;
      margin-bottom: 24px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--card-bg);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .tab {
      padding: 6px 18px;
      border-radius: 8px;
      border: none;
      background: transparent;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.30);
    }
    [data-theme="dark"] .tab.active {
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.30);
    }

    .search-box {
      flex: 0 1 240px;
      min-width: 140px;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }
    .search-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    [data-theme="dark"] .search-box:focus {
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
    }
    .search-box::placeholder { color: var(--text-muted); }

    .stats {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-left: 0;
    }

    /* ===================== 分页控件（上下共用） ===================== */
    .pager-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin: 12px 0 20px;
    }
    .pager-wrapper .page-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }
    .pager-wrapper .page-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .pager-wrapper .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .pager-wrapper .page-info {
      padding: 0 8px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* 顶部分页嵌入控制栏右侧 */
    .inline-pager {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      white-space: nowrap;
      margin-left: auto;
    }
    .inline-pager .page-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }
    .inline-pager .page-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .inline-pager .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .inline-pager .page-info {
      padding: 0 6px;
    }

    /* ===================== 插件网格 ===================== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 12px 0 24px;
      min-height: 200px;
    }

    /* ===================== 卡片 ===================== */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 18px 20px 16px;
      box-shadow: var(--shadow);
      transition: box-shadow var(--transition), transform var(--transition), background 0.3s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .card-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      word-break: break-word;
    }
    .card-version {
      font-size: 0.7rem;
      background: var(--bg);
      color: var(--text-secondary);
      padding: 1px 10px;
      border-radius: 999px;
      white-space: nowrap;
      font-weight: 500;
      margin-top: 2px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 14px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .card-meta .source {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border: 1px solid var(--border);
    }
    .card-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
      margin: 2px 0;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 4px 0 2px;
    }
    .tag {
      font-size: 0.7rem;
      padding: 1px 10px;
      border-radius: 999px;
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .card-footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-items: center;
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      gap: 8px;
    }
    .card-footer .link-btn {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 500;
      transition: var(--transition);
      cursor: pointer;
      text-decoration: none;
    }
    .card-footer .link-btn:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
      text-decoration: none;
    }

    /* ===================== 状态提示 ===================== */
    .status {
      text-align: center;
      padding: 30px 0;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    .status.error { color: #ef4444; }
    .status.loading { color: var(--text-muted); }

    /* ===================== 页脚 ===================== */
    .footer {
      margin-top: 40px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ===================== 响应式 ===================== */
    @media (max-width: 768px) {
      .container { padding: 16px 0; }
      .header { flex-direction: column; align-items: stretch; }
      .header-left h1 { font-size: 1.5rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .tabs { justify-content: center; }
      .search-box { flex: 1; }
      .inline-pager { margin-left: 0; justify-content: center; }
      .stats { text-align: center; }
      .grid { grid-template-columns: 1fr; gap: 14px; }
      .action-btn { justify-content: center; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- ========== 头部 ========== -->
  <header class="header">
    <div class="header-left" id="logoReload" title="点击重新加载">
      <h1>插件市场</h1>
      <span class="badge">镜像</span>
    </div>
    <div class="header-actions">
      <button id="refreshBtn" class="action-btn">刷新</button>
      <button id="themeToggle" class="action-btn">深色</button>
      <button id="copyBtn" class="action-btn">复制链接</button>
    </div>
  </header>

  <!-- ========== 控制栏（含顶部分页） ========== -->
  <div class="controls">
    <div class="tabs" id="tabContainer">
      <button class="tab active" data-source="koi">Koi</button>
      <button class="tab" data-source="astr">Astr</button>
      <button class="tab" data-source="mai">Mai</button>
    </div>
    <input type="text" id="searchInput" class="search-box" placeholder="搜索插件" />
    <span class="stats" id="count">共 0 个插件</span>

    <!-- 顶部分页控件 -->
    <div class="inline-pager" id="topPager">
      <button class="page-btn" id="topPrevBtn" disabled>上一页</button>
      <span class="page-info" id="topPageInfo">1 / 1</span>
      <button class="page-btn" id="topNextBtn" disabled>下一页</button>
    </div>
  </div>

  <!-- ========== 插件网格 ========== -->
  <div class="grid" id="grid"></div>
  <div id="status" class="status loading">正在加载数据…</div>

  <!-- ========== 底部分页控件 ========== -->
  <div class="pager-wrapper" id="bottomPager">
    <button class="page-btn" id="bottomPrevBtn" disabled>上一页</button>
    <span class="page-info" id="bottomPageInfo">1 / 1</span>
    <button class="page-btn" id="bottomNextBtn" disabled>下一页</button>
  </div>

  <!-- ========== 页脚 ========== -->
  <div class="footer">数据来自上游官方仓库，仅供镜像与检索使用。</div>
</div>

<script>
  (function() {
    // ===================== 配置 =====================
    const TAB_MAP = {
      koi: { url: './koi/flat.json', label: 'Koi' },
      astr: { url: './astr/plugin_cache_original.json', label: 'Astr' },
      mai: { url: './mai/flat.json', label: 'Mai' }
    };
    const COPY_MAP = {
      koi: 'https://markets.th-dd.top/koi/index.json',
      astr: 'https://raw.githubusercontent.com/th-dd/markets/refs/heads/gh-pages/astr/plugin_cache_original.json',
      mai: 'https://markets.th-dd.top/mai/flat.json'
    };
    const PAGE_SIZE = 20;

    // ===================== DOM 引用 =====================
    const grid = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const countEl = document.getElementById('count');
    const searchInput = document.getElementById('searchInput');
    const tabs = document.querySelectorAll('.tab');
    const copyBtn = document.getElementById('copyBtn');
    const logoReload = document.getElementById('logoReload');
    const refreshBtn = document.getElementById('refreshBtn');
    const themeToggle = document.getElementById('themeToggle');

    // 顶部分页
    const topPager = document.getElementById('topPager');
    const topPrevBtn = document.getElementById('topPrevBtn');
    const topNextBtn = document.getElementById('topNextBtn');
    const topPageInfo = document.getElementById('topPageInfo');

    // 底部分页
    const bottomPager = document.getElementById('bottomPager');
    const bottomPrevBtn = document.getElementById('bottomPrevBtn');
    const bottomNextBtn = document.getElementById('bottomNextBtn');
    const bottomPageInfo = document.getElementById('bottomPageInfo');

    // ===================== 状态 =====================
    let cache = {};
    let active = 'koi';
    let searchTerm = '';
    let currentPage = 1;
    let totalPages = 1;

    // ===================== 主题切换 =====================
    function getPreferredTheme() {
      const stored = localStorage.getItem('theme');
      if (stored) return stored;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      themeToggle.textContent = theme === 'dark' ? '浅色' : '深色';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      setTheme(current === 'light' ? 'dark' : 'light');
    }

    setTheme(getPreferredTheme());
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('theme')) {
        setTheme(e.matches ? 'dark' : 'light');
      }
    });
    themeToggle.addEventListener('click', toggleTheme);

    // ===================== 工具函数 =====================
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function getArray(data) {
      if (Array.isArray(data)) return data;
      if (data && typeof data === 'object') {
        const v = Object.values(data);
        if (v.length > 0 && v.every(x => x && typeof x === 'object' && !Array.isArray(x))) return v;
        if (v.every(x => Array.isArray(x))) return v.flat();
      }
      return [];
    }

    function getNpmUrl(item, source) {
      if (source !== 'koi') return null;
      if (item.npm) {
        return `https://www.npmjs.com/package/${item.npm}`;
      }
      const name = item.name || item.display_name || '';
      if (name && name !== '未命名') {
        const slug = name
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-');
        if (slug) {
          return `https://www.npmjs.com/package/koishi-plugin-${slug}`;
        }
      }
      return null;
    }

    function cleanRepoUrl(url) {
      if (!url) return '';
      return url.replace(/\.git$/, '');
    }

    // ===================== 过滤 & 渲染 =====================
    function getFilteredData() {
      const arr = getArray(cache[active] || []);
      if (!searchTerm) return arr;
      const lower = searchTerm.toLowerCase();
      return arr.filter(item => {
        return Object.values(item).some(val => {
          if (val === null || val === undefined) return false;
          return String(val).toLowerCase().includes(lower);
        });
      });
    }

    /**
     * 更新所有分页控件的状态（顶部+底部）
     */
    function updateAllPagers() {
      const show = totalPages > 1;
      [topPager, bottomPager].forEach(el => {
        el.style.display = show ? 'flex' : 'none';
      });
      if (show) {
        const infoText = `${currentPage} / ${totalPages}`;
        topPageInfo.textContent = infoText;
        bottomPageInfo.textContent = infoText;

        topPrevBtn.disabled = (currentPage === 1);
        topNextBtn.disabled = (currentPage === totalPages);
        bottomPrevBtn.disabled = (currentPage === 1);
        bottomNextBtn.disabled = (currentPage === totalPages);
      }
    }

    function render() {
      grid.innerHTML = '';
      statusEl.textContent = '';
      statusEl.className = 'status';

      const data = cache[active];
      if (!data) {
        statusEl.className = 'status loading';
        statusEl.textContent = '正在加载数据…';
        return;
      }

      const filtered = getFilteredData();
      countEl.textContent = `共 ${filtered.length} 个插件`;

      if (filtered.length === 0) {
        statusEl.className = 'status';
        statusEl.textContent = '没有找到匹配的插件';
        return;
      }

      totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageData = filtered.slice(start, start + PAGE_SIZE);

      pageData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';

        const name = item.name || item.display_name || '未命名';
        const version = item.version || '';
        const description = item.description || item.desc || '';
        const author = item.author || '';
        const rawRepo = item.repo || item.repository || item.repository_url || '';
        const repo = cleanRepoUrl(rawRepo);
        const tags = item.tags || item.keywords || [];
        const sourceLabel = TAB_MAP[active]?.label || active;

        const npmUrl = getNpmUrl(item, active);

        let html = `
          <div class="card-header">
            <span class="card-name">${esc(name)}</span>
            ${version ? `<span class="card-version">v${esc(version)}</span>` : ''}
          </div>
          <div class="card-meta">
            ${author ? `<span>作者 ${esc(author)}</span>` : ''}
            <span class="source">${esc(sourceLabel)}</span>
          </div>
          ${description ? `<div class="card-desc">${esc(description)}</div>` : ''}
        `;

        if (tags.length) {
          html += `<div class="card-tags">${tags.map(t => `<span class="tag">#${esc(t)}</span>`).join('')}</div>`;
        }

        html += `<div class="card-footer">`;
        if (repo) {
          html += `<a href="${esc(repo)}" target="_blank" rel="noopener noreferrer" class="link-btn">源码</a>`;
        }
        if (npmUrl) {
          html += `<a href="${esc(npmUrl)}" target="_blank" rel="noopener noreferrer" class="link-btn">npm</a>`;
        }
        html += `</div>`;

        card.innerHTML = html;
        grid.appendChild(card);
      });

      updateAllPagers();
    }

    // ===================== 分页操作 =====================
    function goToPage(page) {
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 顶部按钮绑定
    topPrevBtn.addEventListener('click', () => goToPage(currentPage - 1));
    topNextBtn.addEventListener('click', () => goToPage(currentPage + 1));

    // 底部按钮绑定
    bottomPrevBtn.addEventListener('click', () => goToPage(currentPage - 1));
    bottomNextBtn.addEventListener('click', () => goToPage(currentPage + 1));

    window.goToPage = goToPage;

    // ===================== 切换数据源 =====================
    window.switchTo = async function(source, force = false) {
      if (force) delete cache[source];

      if (source === active && cache[source] && !force) {
        active = source;
        tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.source === source));
        currentPage = 1;
        render();
        return;
      }

      active = source;
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.source === source));
      searchInput.value = '';
      searchTerm = '';
      currentPage = 1;

      statusEl.className = 'status loading';
      statusEl.textContent = '正在加载数据…';
      grid.innerHTML = '';

      try {
        if (!cache[source]) {
          const url = TAB_MAP[source].url;
          const resp = await fetch(url);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const json = await resp.json();
          cache[source] = getArray(json);
        }
        render();
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = `加载失败：${err.message}`;
      }
    };

    // ===================== 事件绑定 =====================

    logoReload.addEventListener('click', function() {
      switchTo(active, true);
    });

    refreshBtn.addEventListener('click', function() {
      switchTo(active, true);
    });

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const source = tab.dataset.source;
        if (source !== active) {
          switchTo(source);
        }
      });
    });

    let searchTimer = null;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchTerm = e.target.value.trim();
        currentPage = 1;
        render();
      }, 250);
    });

    copyBtn.addEventListener('click', async () => {
      const url = COPY_MAP[active] || '';
      if (!url) {
        copyBtn.textContent = '无链接';
        setTimeout(() => { copyBtn.textContent = '复制链接'; }, 1500);
        return;
      }
      try {
        await navigator.clipboard.writeText(url);
        copyBtn.textContent = '已复制';
        copyBtn.classList.add('success');
        setTimeout(() => {
          copyBtn.textContent = '复制链接';
          copyBtn.classList.remove('success');
        }, 1500);
      } catch {
        copyBtn.textContent = '失败';
        setTimeout(() => { copyBtn.textContent = '复制链接'; }, 1500);
      }
    });

    // ===================== 初始加载 =====================
    switchTo('koi');
  })();
</script>
</body>
</html>
